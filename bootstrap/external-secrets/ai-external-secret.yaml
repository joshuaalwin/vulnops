# ExternalSecret — hydrates vulnops-ai-secret in the vulnops namespace
# from the AWS Secrets Manager secret vulnops/ai-credentials.
#
# The materialized K8s Secret exposes ANTHROPIC_API_KEY for the backend
# pod's risk-intel route. The Anthropic SDK auto-reads the env var, so
# no backend code change is required beyond the deployment.yaml wiring.
#
# The AWS secret itself is seeded out-of-band (never through git or CI):
#   aws secretsmanager put-secret-value \
#     --secret-id vulnops/ai-credentials \
#     --secret-string '{"ANTHROPIC_API_KEY":"sk-ant-..."}'
#
# refreshInterval: 1h
#   On key rotation, ESO updates the K8s Secret in place but running
#   pods still hold the old value until restart — matches DB secret
#   behaviour, same rationale (no mid-request env-var swap).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: vulnops-ai-secret
  namespace: vulnops
spec:
  refreshInterval: 1h

  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore

  target:
    name: vulnops-ai-secret
    creationPolicy: Owner   # ESO owns and garbage-collects the K8s Secret
    deletionPolicy: Retain  # If the ExternalSecret is deleted, keep the K8s Secret so the pod doesn't crash

  data:
    - secretKey: ANTHROPIC_API_KEY
      remoteRef:
        key: vulnops/ai-credentials
        property: ANTHROPIC_API_KEY
