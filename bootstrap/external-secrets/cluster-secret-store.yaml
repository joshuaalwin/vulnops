# ClusterSecretStore — cluster-wide ESO provider configuration for AWS Secrets Manager.
#
# ClusterSecretStore (vs SecretStore) is used because:
#   - Auth is via Pod Identity bound to ESO's SA, not a namespace-scoped credential
#   - Any ExternalSecret in any namespace can reference this store
#   - Single source of configuration for the whole cluster
#
# auth.jwt is omitted deliberately: ESO detects the Pod Identity Agent
# automatically and exchanges its own SA token for AWS credentials.
# No static key, no IRSA role annotation — Pod Identity handles it.
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
