# ExternalSecret — hydrates vulnops-db-secret in the vulnops namespace
# from the AWS Secrets Manager secret vulnops/db-credentials.
#
# The materialized K8s Secret keeps the exact same name (vulnops-db-secret)
# and keys (POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB) that the backend
# and postgres deployments already consume — no deployment changes required.
#
# refreshInterval: 1h
#   ESO will re-fetch the secret once an hour. On rotation, the K8s Secret
#   is updated in place but running pods still hold the old value in env
#   vars until restart — that's an intentional tradeoff (no silent
#   connection-pool corruption from a mid-request password swap).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: vulnops-db-secret
  namespace: vulnops
spec:
  refreshInterval: 1h

  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore

  target:
    name: vulnops-db-secret
    creationPolicy: Owner   # ESO owns and garbage-collects the K8s Secret
    deletionPolicy: Retain  # If the ExternalSecret is deleted, keep the K8s Secret so pods don't crash

  data:
    - secretKey: POSTGRES_USER
      remoteRef:
        key: vulnops/db-credentials
        property: POSTGRES_USER

    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: vulnops/db-credentials
        property: POSTGRES_PASSWORD

    - secretKey: POSTGRES_DB
      remoteRef:
        key: vulnops/db-credentials
        property: POSTGRES_DB
