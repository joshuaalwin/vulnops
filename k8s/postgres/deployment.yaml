apiVersion: apps/v1
kind: Deployment
metadata:
  name: vulnops-postgres
  namespace: vulnops
spec:
  replicas: 1
  strategy:
    type: Recreate  # EBS (ReadWriteOnce) can't attach to two nodes simultaneously — terminate old pod first
  selector:
    matchLabels:
      app: vulnops-postgres
  template:
    metadata:
      labels:
        app: vulnops-postgres
    spec:
      automountServiceAccountToken: false  # postgres has no need to call the K8s API
      securityContext:
        fsGroup: 999      # ensures the mounted PVC data dir is group-writable by the postgres user
        # runAsNonRoot not set: postgres entrypoint starts as root to chown/chmod the data dir,
        # then drops to uid 999 (postgres user) before starting the server. This is the image's
        # intended behavior. Baseline PSS enforced at namespace level prevents privileged escalation.
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: vulnops-db-secret  # injects POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
              subPath: pgdata               # avoids EBS lost+found conflicts at volume root
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false  # postgres writes socket/lock/temp files — cannot be read-only
            # CAP_CHOWN/FOWNER retained: initdb needs to chmod/chown $PGDATA at startup.
            # All other capabilities dropped. Database tier uses baseline PSS for this reason.
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "vulnops", "-d", "vulnops"]
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "vulnops", "-d", "vulnops"]
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-pvc
