apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: vulnops
spec:
  podSelector: {}  # applies to every pod in the namespace
  policyTypes:
    - Ingress
    - Egress
  # no rules = deny all traffic by default
  # every subsequent policy is an explicit allow on top of this baseline
