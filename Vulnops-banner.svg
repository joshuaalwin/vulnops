<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#15203B" stroke-width="1"/>
    </pattern>
    
    <linearGradient id="devOpsGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3A506B" />
      <stop offset="100%" stop-color="#5BC0BE" />
    </linearGradient>
    
    <linearGradient id="securityGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00E5FF" />
      <stop offset="100%" stop-color="#0D47A1" />
    </linearGradient>
  </defs>

  <rect width="1200" height="400" fill="#0B132B" />
  
  <rect width="1200" height="400" fill="url(#grid)" />

  <g transform="translate(260, 115) scale(1.5)">
    <path d="M 120,75 C 90,25 35,25 35,75 C 35,125 90,125 120,75" 
          fill="none" stroke="url(#devOpsGradient)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

    <path d="M 120,75 L 150,35 L 185,35 L 200,50 L 200,85 L 160,120 Z" 
          fill="none" stroke="url(#securityGradient)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

    <circle cx="120" cy="75" r="10" fill="#0B132B" stroke="#00E5FF" stroke-width="3"/>
    
    <circle cx="120" cy="73" r="3" fill="#00E5FF" />
    <path d="M 118,75 L 122,75 L 123,81 L 117,81 Z" fill="#00E5FF" />
    
    <text x="230" y="85" font-family="'Inter', 'SF Pro Display', sans-serif" font-size="48" font-weight="800" fill="#FFFFFF" letter-spacing="4">VULNOPS</text>
    
    <text x="235" y="115" font-family="'Inter', 'SF Pro Text', sans-serif" font-size="13" font-weight="600" fill="#5BC0BE" letter-spacing="5">ENTERPRISE SECURITY REGISTRY</text>
  </g>
</svg>
