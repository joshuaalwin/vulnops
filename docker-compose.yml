services:

  db:
    image: postgres:16-alpine
    container_name: vulnops-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: vulnops
      POSTGRES_USER: vulnops
      POSTGRES_PASSWORD: vulnops
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - vulnops-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vulnops"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vulnops-backend
    restart: unless-stopped
    environment:
      PORT: 5000
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: vulnops
      DB_USER: vulnops
      DB_PASSWORD: vulnops
    depends_on:
      db:
        condition: service_healthy
    networks:
      - vulnops-net
    security_opt:
      - no-new-privileges:true

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vulnops-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - vulnops-net
    security_opt:
      - no-new-privileges:true

networks:
  vulnops-net:
    driver: bridge

volumes:
  postgres_data:
